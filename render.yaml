services:

  # Service 1: Flask + CrewAI Backend
  - type: web
    name: growthteam-backend
    runtime: python
    rootDir: backend
    buildCommand: python -m pip install --upgrade pip && pip install --no-cache-dir -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: GROQ_API_KEY
        sync: false
      - key: API_SECRET_KEY
        sync: false
    plan: free

  # Service 2: Next.js Frontend
  - type: web
    name: growthteam-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: NODE_OPTIONS
        value: --max-old-space-size=450
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CREWAI_BACKEND_URL
        sync: false
      - key: CREWAI_API_SECRET
        sync: false
    plan: free
